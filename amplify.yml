version: 1
backend:
    phases:
        preBuild:
            commands:
                - npm config set build-from-source false
        build:
            commands:
                - npm ci --cache .npm --prefer-offline
                - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID

frontend:
    phases:
        build:
            commands:
                - npm run build
    artifacts:
        baseDirectory: dist
        files:
            - "**/*"
    cache:
        paths:
            - .npm/**/*
            - node_modules/**/*
